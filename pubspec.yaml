name: harmony_player
description: Beautiful cross-platform music player with auto-updates.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Audio
  just_audio: ^0.9.38
  audio_service: ^0.18.13
  audio_session: ^0.1.21
  just_audio_background: ^0.0.1-beta.13

  # Library & Metadata
  on_audio_query: ^2.9.1
  permission_handler: ^11.3.1
  audiotags: ^1.0.3

  # State & Storage
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  http: ^1.2.1
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Utils
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.6
  open_file: ^3.3.2
  path_provider: ^2.1.3
  intl: ^0.19.0
  uuid: ^4.4.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_slidable: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  msix: ^3.16.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 24

msix_config:
  display_name: Harmony Player
  publisher_display_name: Parsa
  identity_name: com.parsa.harmony
  logo_path: assets\images\icon.png
  capabilities: internetClient, musicLibrary
