name: Build & Release Harmony Player

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'
  APP_NAME: harmony-player
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ⭐ Force Node 24

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════
  # ANDROID BUILD
  # ═══════════════════════════════════════════════════════════
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # ⭐ Disable Flutter Analytics banner
      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Create placeholder assets
        run: |
          set -e
          mkdir -p assets/images
          if [ ! -f "assets/images/icon.png" ]; then
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==" | base64 -d > assets/images/icon.png
            if command -v convert >/dev/null 2>&1; then
              convert -size 1024x1024 xc:"#6750A4" assets/images/icon.png || true
            fi
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate app icons
        run: |
          set -e
          if [ -f "assets/images/icon.png" ]; then
            dart run flutter_launcher_icons || echo "Icon generation failed, continuing..."
          fi

      - name: Decode Keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -e
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -e
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build APK (split per ABI)
        run: |
          set -e
          flutter build apk --release --split-per-abi

      - name: Build APK (universal)
        run: |
          set -e
          flutter build apk --release

      - name: Rename artifacts
        run: |
          set -e
          cd build/app/outputs/flutter_apk
          mv app-release.apk ${{ env.APP_NAME }}-${{ github.ref_name }}-universal.apk
          [ -f app-arm64-v8a-release.apk ] && mv app-arm64-v8a-release.apk ${{ env.APP_NAME }}-${{ github.ref_name }}-arm64.apk || true
          [ -f app-armeabi-v7a-release.apk ] && mv app-armeabi-v7a-release.apk ${{ env.APP_NAME }}-${{ github.ref_name }}-arm.apk || true
          [ -f app-x86_64-release.apk ] && mv app-x86_64-release.apk ${{ env.APP_NAME }}-${{ github.ref_name }}-x86_64.apk || true

      - uses: actions/upload-artifact@v5
        with:
          name: android-artifacts
          path: build/app/outputs/flutter_apk/*.apk

  # ═══════════════════════════════════════════════════════════
  # iOS BUILD
  # ═══════════════════════════════════════════════════════════
  build-ios:
    name: 📱 iOS IPA
    runs-on: macos-15  # ⭐ Pinned to avoid macOS 26 breaking changes
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Create placeholder assets
        run: |
          set -e
          mkdir -p assets/images
          if [ ! -f "assets/images/icon.png" ]; then
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==" | base64 -d > assets/images/icon.png
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate app icons
        run: |
          set -e
          if [ -f "assets/images/icon.png" ]; then
            dart run flutter_launcher_icons || echo "Icon generation failed, continuing..."
          fi

      - name: Install iOS pods
        run: |
          set -e
          cd ios
          pod install --repo-update

      - name: Build iOS (no-codesign)
        run: |
          set -e
          flutter build ios --release --no-codesign

      - name: Create IPA archive
        run: |
          set -e
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ${{ env.APP_NAME }}-${{ github.ref_name }}-ios.ipa Payload

      - uses: actions/upload-artifact@v5
        with:
          name: ios-artifacts
          path: ${{ env.APP_NAME }}-${{ github.ref_name }}-ios.ipa

  # ═══════════════════════════════════════════════════════════
  # WINDOWS BUILD (Windows 7/8/10/11)
  # ═══════════════════════════════════════════════════════════
  build-windows:
    name: 🪟 Windows (7/8/10/11)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      - name: Create placeholder assets
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path "assets\images" | Out-Null
          if (-Not (Test-Path "assets\images\icon.png")) {
            [byte[]]$png = [Convert]::FromBase64String("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==")
            [IO.File]::WriteAllBytes("assets\images\icon.png", $png)
          }
        shell: pwsh

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate app icons
        run: |
          $ErrorActionPreference = 'Continue'
          if (Test-Path "assets\images\icon.png") {
            dart run flutter_launcher_icons
          }
        shell: pwsh

      - name: Build Windows
        run: |
          $ErrorActionPreference = 'Stop'
          flutter build windows --release
        shell: pwsh

      - name: Create Portable ZIP
        run: |
          $ErrorActionPreference = 'Stop'
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "${{ env.APP_NAME }}-${{ github.ref_name }}-windows-x64.zip" -Force
        shell: pwsh

      - uses: actions/upload-artifact@v5
        with:
          name: windows-artifacts
          path: ${{ env.APP_NAME }}-${{ github.ref_name }}-windows-x64.zip

  # ═══════════════════════════════════════════════════════════
  # macOS BUILD
  # ═══════════════════════════════════════════════════════════
  build-macos:
    name: 🍎 macOS
    runs-on: macos-15  # ⭐ Pinned to avoid macOS 26 OpenSSL 3.x breaking changes
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      - name: Create placeholder assets
        run: |
          set -e
          mkdir -p assets/images
          if [ ! -f "assets/images/icon.png" ]; then
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==" | base64 -d > assets/images/icon.png
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate app icons
        run: |
          set -e
          if [ -f "assets/images/icon.png" ]; then
            dart run flutter_launcher_icons || echo "Icon generation failed, continuing..."
          fi

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install macOS pods
        run: |
          set -e
          cd macos
          pod install --repo-update

      - name: Build macOS
        run: |
          set -e
          flutter build macos --release

      - name: Create DMG
        id: create_dmg
        run: |
          set -e
          brew install create-dmg
          create-dmg \
            --volname "Harmony Player" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "${{ env.APP_NAME }}-${{ github.ref_name }}-macos.dmg" \
            "build/macos/Build/Products/Release/" || exit 1

      # ⭐ Fixed fallback: Check directory exists before cd
      - name: Create tar.gz fallback
        if: failure()
        run: |
          if [ -d "build/macos/Build/Products/Release" ]; then
            cd build/macos/Build/Products/Release
            tar -czvf ../../../../../${{ env.APP_NAME }}-${{ github.ref_name }}-macos.tar.gz *.app || true
          else
            echo "Build directory not found. Skipping tar.gz creation due to earlier build failure."
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: macos-artifacts
          path: |
            ${{ env.APP_NAME }}-${{ github.ref_name }}-macos.dmg
            ${{ env.APP_NAME }}-${{ github.ref_name }}-macos.tar.gz

  # ═══════════════════════════════════════════════════════════
  # LINUX BUILD
  # ═══════════════════════════════════════════════════════════
  build-linux:
    name: 🐧 Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev imagemagick

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      - name: Create placeholder assets
        run: |
          set -e
          mkdir -p assets/images
          if [ ! -f "assets/images/icon.png" ]; then
            convert -size 1024x1024 xc:"#6750A4" assets/images/icon.png || \
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==" | base64 -d > assets/images/icon.png
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate app icons
        run: |
          set -e
          if [ -f "assets/images/icon.png" ]; then
            dart run flutter_launcher_icons || echo "Icon generation failed, continuing..."
          fi

      - name: Build Linux
        run: |
          set -e
          flutter build linux --release

      - name: Create tar.gz
        run: |
          set -e
          cd build/linux/x64/release/bundle
          tar -czvf ${{ env.APP_NAME }}-${{ github.ref_name }}-linux.tar.gz *

      - uses: actions/upload-artifact@v5
        with:
          name: linux-artifacts
          path: build/linux/x64/release/bundle/${{ env.APP_NAME }}-${{ github.ref_name }}-linux.tar.gz

  # ═══════════════════════════════════════════════════════════
  # CREATE GITHUB RELEASE
  # ═══════════════════════════════════════════════════════════
  release:
    name: 🚀 Publish Release
    needs: [build-android, build-ios, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release files
        run: |
          set -e
          mkdir -p release
          find artifacts -type f \( -name "*.apk" -o -name "*.ipa" -o -name "*.dmg" -o -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
          name: Harmony Player ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
