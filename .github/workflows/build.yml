name: Build & Release Harmony Player

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'
  APP_NAME: harmony-player

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════
  # ANDROID BUILD
  # ═══════════════════════════════════════════════════════════
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # ⭐ FIX: Use env mapping instead of direct secrets in if condition
      - name: Decode Keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build APK (universal)
        run: flutter build apk --release

      - name: Rename artifacts
        run: |
          cd build/app/outputs/flutter_apk
          mv app-release.apk ${{ env.APP_NAME }}-${{ github.ref_name }}-universal.apk
          [ -f app-arm64-v8a-release.apk ] && mv app-arm64-v8a-release.apk ${{ env.APP_NAME }}-${{ github.ref_name }}-arm64.apk
          [ -f app-armeabi-v7a-release.apk ] && mv app-armeabi-v7a-release.apk ${{ env.APP_NAME }}-${{ github.ref_name }}-arm.apk
          [ -f app-x86_64-release.apk ] && mv app-x86_64-release.apk ${{ env.APP_NAME }}-${{ github.ref_name }}-x86_64.apk
          cd -

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: build/app/outputs/flutter_apk/*.apk

  # ═══════════════════════════════════════════════════════════
  # iOS BUILD
  # ═══════════════════════════════════════════════════════════
  build-ios:
    name: 📱 iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install iOS pods
        run: cd ios && pod install --repo-update && cd ..

      - name: Build iOS (no-codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA archive
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ${{ env.APP_NAME }}-${{ github.ref_name }}-ios.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: ${{ env.APP_NAME }}-${{ github.ref_name }}-ios.ipa

  # ═══════════════════════════════════════════════════════════
  # WINDOWS BUILD (Windows 7/8/10/11)
  # ═══════════════════════════════════════════════════════════
  build-windows:
    name: 🪟 Windows (7/8/10/11)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Create Portable ZIP
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "${{ env.APP_NAME }}-${{ github.ref_name }}-windows-x64.zip"
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: ${{ env.APP_NAME }}-${{ github.ref_name }}-windows-x64.zip

  # ═══════════════════════════════════════════════════════════
  # macOS BUILD
  # ═══════════════════════════════════════════════════════════
  build-macos:
    name: 🍎 macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install macOS pods
        run: cd macos && pod install --repo-update && cd ..

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Harmony Player" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "${{ env.APP_NAME }}-${{ github.ref_name }}-macos.dmg" \
            "build/macos/Build/Products/Release/"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: ${{ env.APP_NAME }}-${{ github.ref_name }}-macos.dmg

  # ═══════════════════════════════════════════════════════════
  # LINUX BUILD
  # ═══════════════════════════════════════════════════════════
  build-linux:
    name: 🐧 Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux
        run: flutter build linux --release

      - name: Create tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar -czvf ${{ env.APP_NAME }}-${{ github.ref_name }}-linux.tar.gz *
          mv ${{ env.APP_NAME }}-${{ github.ref_name }}-linux.tar.gz ../../../../..

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: ${{ env.APP_NAME }}-${{ github.ref_name }}-linux.tar.gz

  # ═══════════════════════════════════════════════════════════
  # CREATE GITHUB RELEASE
  # ═══════════════════════════════════════════════════════════
  release:
    name: 🚀 Publish Release
    needs: [build-android, build-ios, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.apk" -o -name "*.ipa" -o -name "*.dmg" -o -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
          name: Harmony Player ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
